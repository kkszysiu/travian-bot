name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact: travian-bot-macos
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: travian-bot-linux-amd64
            build-tags: webkit2_41
          - os: windows-latest
            platform: windows/amd64
            artifact: travian-bot-windows-amd64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.artifact }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        run: wails build -platform ${{ matrix.platform }} ${{ matrix.build-tags && format('-tags {0}', matrix.build-tags) || '' }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        working-directory: build/bin
        run: zip -r ${{ matrix.artifact }}.zip *.app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        working-directory: build/bin
        run: tar czf ${{ matrix.artifact }}.tar.gz travian-bot

      - name: Package (Windows)
        if: runner.os == 'Windows'
        working-directory: build/bin
        run: Compress-Archive -Path travian-bot.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}.*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
